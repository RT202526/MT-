<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RS 4K TV | FIFA WORLD CUP</title>
    <meta name="referrer" content="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        /* আপনার অরিজিনাল সুন্দর ডিজাইনটি এখানে দেওয়া হলো */
        :root {
            --bg-base: #030305; --neon-green: #00ff66; --gold-primary: #d4af37;
            --gold-light: #f3e5ab; --electric-cyan: #00f0ff; --danger-red: #ff3333;
            --glass-bg: rgba(15, 20, 25, 0.4); --glass-border: rgba(255, 255, 255, 0.08);
            --font-ui: 'Inter', sans-serif; --font-display: 'Rajdhani', sans-serif; --font-signature: 'Great Vibes', cursive;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: var(--font-ui); background-color: var(--bg-base); color: #ffffff; min-height: 100vh; overflow-x: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: linear-gradient(180deg, rgba(0,0,0,0.9), transparent); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .brand-name { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--gold-light), var(--gold-primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; }
        
        .container { width: 100%; max-width: 1800px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 2.2fr 1fr; gap: 30px; }
        
        .player-wrapper { position: relative; width: 100%; padding-top: 56.25%; border-radius: 16px; overflow: hidden; background: #000; border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(212, 175, 55, 0.1); }
        .player-overlay { position: absolute; inset: 0; z-index: 5; background: #000; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); text-align: center; padding: 20px; transition: opacity 0.4s ease; opacity: 1; flex-direction: column;}
        .player-overlay h2 { color: var(--gold-primary); font-size: 2rem; margin-bottom: 10px;}
        .player-overlay p { color: #aaa; font-size: 1rem;}
        
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 16px; position: relative; overflow: hidden; width: 100%;}
        .panel-header { font-family: var(--font-display); font-size: 1.2rem; color: var(--gold-primary); border-bottom: 1px solid var(--glass-border); padding: 20px; }
        
        .server-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 20px 25px 25px; max-height: 450px; overflow-y: auto; overflow-x: hidden; }
        .server-grid::-webkit-scrollbar { width: 4px; }
        .server-grid::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }
        
        .server-btn { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #fff; padding: 14px 15px; border-radius: 8px; font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; text-align: left; cursor: pointer; transition: 0.3s; }
        .server-btn:hover { border-color: var(--gold-primary); background: rgba(212,175,55,0.1); }
        
        @media (max-width: 1200px) { .container { display: flex; flex-direction: column; } }
        @media (max-width: 768px) { header { flex-direction: column; align-items: flex-start; } .brand-name { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <header>
        <div class="brand-name">🏆 RS 4K TV <span style="font-weight:400;">FIFA WORLD CUP</span></div>
    </header>

    <main class="container">
         <div class="player-wrapper" id="player-container">
    <!-- উপরের কালো পর্দা (লোডিং স্ক্রিন) -->
    <div id="player-overlay" class="player-overlay" style="opacity: 1; pointer-events: auto; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; background: #000;">
        <h2 id="player-msg-title" style="color: var(--gold-primary); font-size: 2.2rem; margin-bottom: 10px; font-family: var(--font-display);">SELECT A MATCH</h2>
        <p id="player-msg-desc" style="color: #aaa; font-size: 1.1rem; font-family: var(--font-ui);">Choose a broadcast network from the list below.</p>
    </div>
    
    <!-- আসল টিভি স্ক্রিন (ভিডিও প্লেয়ার) -->
    <iframe id="main-iframe" src="" allowfullscreen style="position: absolute; top:0; left:0; width:100%; height:100%; border:none; z-index: 1; display: block;"></iframe>
</div>
            <div class="glass-panel">
                <div class="panel-header">📡 SELECT BROADCAST NETWORK</div>
                <div class="server-grid" id="server-container">
                    </div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="glass-panel">
                <div class="panel-header">🔴 LIVE MATCH CENTER</div>
                <div style="padding: 25px; text-align: center; color: #aaa;">Data loading...</div>
            </div>
        </div>
    </main>

     <script>
        let rawServers = [];
        const playerOverlay = document.getElementById('player-overlay');
        const msgTitle = document.getElementById('player-msg-title');
        const msgDesc = document.getElementById('player-msg-desc');

        // ১. ভিডিও লোড করার ইঞ্জিন
        async function loadStream(server) {
            const iframe = document.getElementById('main-iframe');

            playerOverlay.style.opacity = '1';
            msgTitle.innerText = "FETCHING SECURE STREAM...";
            msgDesc.innerText = `Connecting to broadcast feed for: ${server.name}`;
            msgTitle.style.color = "var(--electric-cyan)";

            try {
                const streamApiUrl = `https://streamed.pk/api/stream/${server.source}/${server.id}`;
                const response = await fetch(streamApiUrl);
                const streamData = await response.json();

                if (streamData && streamData.length > 0) {
                    const videoUrl = streamData[0].embedUrl;
                    iframe.src = videoUrl;

                    iframe.onload = () => {
                        playerOverlay.style.opacity = '0';
                    };
                } else {
                    msgTitle.innerText = "NO FEED";
                    msgDesc.innerText = "Broadcast hasn't started yet or link is down.";
                    msgTitle.style.color = "var(--danger-red)";
                }

            } catch (error) {
                console.error("Stream API Error:", error);
                msgTitle.innerText = "STREAM OFFLINE";
                msgDesc.innerText = "Could not fetch video feed from server.";
                msgTitle.style.color = "var(--danger-red)";
            }
        }

        // ২. এই ফাংশনটাই আপনার কোড থেকে মুছে গিয়েছিল! (বাটন মেকার)
        function renderChannels() {
            const container = document.getElementById('server-container');
            container.innerHTML = "";
            
            if (rawServers.length === 0) {
                container.innerHTML = "<p style='color:#888;'>No live matches available right now.</p>";
                return;
            }

            rawServers.forEach(server => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.innerText = "📺 " + server.name;
                btn.onclick = () => loadStream(server);
                container.appendChild(btn);
            });
        }

        // ৩. এপিআই থেকে লাইভ ম্যাচের লিস্ট আনা
        async function loadChannels() {
            try {
                const response = await fetch('https://streamed.pk/api/matches/live');
                const matches = await response.json();
                
                rawServers = matches.map(match => ({
                    name: match.title,
                    source: match.sources && match.sources.length > 0 ? match.sources[0].source : "alpha",
                    id: match.sources && match.sources.length > 0 ? match.sources[0].id : ""
                }));

                renderChannels();
            } catch (error) {
                console.error("API লোড এরর:", error);
                document.getElementById('server-container').innerHTML = "<p style='color:#ff3333;'>Failed to connect to API server.</p>";
            }
        }

        // পেজ লোড হলেই রান করবে
        document.addEventListener('DOMContentLoaded', () => {
            loadChannels();
        });
    </script>
    
    </script>
</body>
</html>
